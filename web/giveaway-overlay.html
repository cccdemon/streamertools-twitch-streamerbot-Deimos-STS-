<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Giveaway Overlay</title>
<link rel="stylesheet" href="giveaway-overlay.css">
<script src="validate.js"></script>
</head>
<body>

<div id="winner-overlay">
  <div class="win-label">// GEWINNER //</div>
  <div class="win-name"    id="ov-winner-name">-</div>
  <div class="win-tickets" id="ov-winner-tickets"></div>
</div>

<div id="overlay">
  <div class="ov-header">
    <span class="ov-title">// GIVEAWAY</span>
    <span class="ov-status open" id="ov-status">OPEN</span>
  </div>
  <div class="ov-stats">
    <div class="ov-stat">
      <span class="ov-stat-val" id="ov-total">0</span>
      <span class="ov-stat-lbl">CREW</span>
    </div>
    <div class="ov-stat">
      <span class="ov-stat-val" id="ov-tickets">0</span>
      <span class="ov-stat-lbl">TICKETS</span>
    </div>
  </div>
  <div class="ov-top-title">TOP ANWAERTER</div>
  <div id="ov-top5"></div>
</div>

<script src="giveaway-overlay.js"></script>
</body>
</html>
